  ╔══════════════════════════════════════════════════════════════╗
  ║  TELEGRAM BOT ADMIN DASHBOARD — React + FastAPI             ║

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--bg2:#111520;--bg3:#181d2a;--bg4:#1e2538;
  --border:#ffffff12;--border2:#ffffff22;
  --text:#e8eaf2;--muted:#6b7280;--accent:#4f8ef7;--accent2:#7c6ef7;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--pink:#ec4899;
  --radius:12px;--radius-sm:8px;
  font-family:'Outfit',sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.shell{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh}
.logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.logo-title{font-size:15px;font-weight:600;letter-spacing:.5px}
.logo-sub{font-size:11px;color:var(--muted);margin-top:2px}
.nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13.5px;color:var(--muted);transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:#4f8ef715;color:var(--accent)}
.nav-icon{font-size:16px;width:18px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px;min-width:18px;text-align:center}
.sidebar-footer{padding:14px 10px;border-top:1px solid var(--border)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{flex:1;overflow-x:hidden;min-width:0}
.topbar{padding:20px 28px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.page-title{font-size:22px;font-weight:600}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px}
.refresh-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-family:'Outfit',sans-serif;transition:all .15s}
.refresh-btn:hover{color:var(--text);border-color:var(--border2)}
.content{padding:0 28px 28px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.blue::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.stat-card.green::before{background:linear-gradient(90deg,var(--green),#16a34a)}
.stat-card.amber::before{background:linear-gradient(90deg,var(--amber),#d97706)}
.stat-card.red::before{background:linear-gradient(90deg,var(--red),#dc2626)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.stat-value{font-size:28px;font-weight:600;letter-spacing:-.5px}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
.stat-icon{position:absolute;right:16px;top:18px;font-size:22px;opacity:.25}
.row2{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-title{font-size:13px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:16px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;padding:0 12px 10px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:11px 12px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#ffffff04}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:#22c55e18;color:#4ade80}
.badge-amber{background:#f59e0b18;color:#fbbf24}
.badge-red{background:#ef444418;color:#f87171}
.badge-blue{background:#4f8ef718;color:#93c5fd}
.badge-gray{background:#6b728018;color:#9ca3af}
.action-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'Outfit',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.action-btn:hover{border-color:var(--border2);color:var(--text)}
.action-btn.approve:hover{border-color:#22c55e44;color:var(--green)}
.action-btn.reject:hover{border-color:#ef444444;color:var(--red)}
.action-btn.danger:hover{border-color:#ef444444;color:var(--red)}
.action-btn.info:hover{border-color:#4f8ef744;color:var(--accent)}
.mono{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--muted)}
.toggle-pill{position:relative;width:38px;height:21px;cursor:pointer}
.toggle-pill input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;border-radius:21px;background:var(--bg4);transition:.2s;border:1px solid var(--border)}
.toggle-track.on{background:#22c55e30;border-color:#22c55e50}
.toggle-thumb{position:absolute;top:3px;left:3px;width:13px;height:13px;border-radius:50%;background:var(--muted);transition:.2s}
.toggle-thumb.on{left:20px;background:var(--green)}
.input-row{display:flex;gap:8px;margin-bottom:14px}
.inp{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius-sm);font-size:13px;font-family:'Outfit',sans-serif;outline:none;transition:border .15s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;border:none;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#3d7ef0}
.btn-sm{padding:5px 12px;font-size:12px}
.textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--radius-sm);font-size:12.5px;font-family:'DM Mono',monospace;resize:vertical;outline:none;min-height:100px}
.textarea:focus{border-color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:#00000088;display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;width:460px;max-width:90vw}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-ghost{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text)}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.search-wrap{margin-bottom:14px}
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.filter-btn.active{background:#4f8ef720;color:var(--accent);border-color:#4f8ef740}
.chart-wrap{height:160px}
.product-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.emoji-big{font-size:20px}
.key-chip{display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
.sidebar-version{font-size:10px;color:#ffffff18;padding:0 20px 14px;font-family:'DM Mono',monospace}
</style>

// ─── API helper ──────────────────────────────────────────────────────────────
async function api(path, opts={}){
  if(MOCK_MODE){
    // Simulate API with mock data
    const key=path.replace('/api/','').split('/')[0];
    if(key==='stats')return MOCK.stats;
    if(key==='products')return MOCK.products;
    if(key==='orders')return MOCK.orders;
    if(key==='clients')return MOCK.clients;
    return {};
  }
  const r=await fetch(API_BASE+path,{...opts,headers:{'Content-Type':'application/json',...opts.headers}});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

// ─── Products ─────────────────────────────────────────────────────────────────
function Products({data,setData}){
  const [showAdd,setShowAdd]=useState(false);
