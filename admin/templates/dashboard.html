<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4">
        🛒 Admin Dashboard
    </h1>

    <div class="row">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h3>📦 Products</h3>

                    <a
                        href="/admin/products"
                        class="btn btn-primary mt-3"
                    >
                        Manage Products
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h3>🧾 Orders</h3>

                    <a
                        href="/admin/orders"
                        class="btn btn-success mt-3"
                    >
                        View Orders
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
